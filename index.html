<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,300..700;1,7..72,300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --text: #1c1b19;
      --muted: #8a8680;
      --border: #e8e5e0;
      --accent: #2c2b28;
    }

    html { font-size: 18px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Literata', Georgia, serif;
      min-height: 100vh;
    }

    /* ── Lock Screen ─────────────────────────────────────────────────────────── */

    #lock-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 100;
    }

    #lock-screen.hidden { display: none; }

    .lock-icon {
      color: var(--text);
      opacity: 0.15;
      transition: opacity 0.4s, transform 0.4s;
    }

    .lock-icon.unlocking {
      opacity: 0.6;
      transform: translateY(-4px);
    }

    .lock-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .lock-hint {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .lock-input-row { display: flex; gap: 0.5rem; }

    #lock-password {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.9rem;
      padding: 0.55rem 0.9rem;
      border-radius: 4px;
      width: 160px;
      outline: none;
      transition: border-color 0.2s;
    }

    #lock-password:focus { border-color: var(--accent); }
    #lock-password.error { border-color: #c0392b; }

    #lock-submit {
      border: 1px solid var(--border);
      background: var(--accent);
      color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      padding: 0.55rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #lock-submit:hover { opacity: 0.8; }
    #lock-submit:disabled { opacity: 0.5; cursor: default; }

    /* ── Book ────────────────────────────────────────────────────────────────── */

    #book {
      max-width: 660px;
      margin: 0 auto;
      padding: 6rem 2rem 10rem;
    }

    #book.hidden { display: none; }

    .book-header {
      text-align: center;
      margin-bottom: 5rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--border);
    }

    .book-title {
      font-size: 2.4rem;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .book-subtitle {
      font-size: 1rem;
      font-style: italic;
      color: var(--muted);
      font-weight: 300;
    }

    .toc { margin-bottom: 5rem; }

    .toc-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .toc-list { list-style: none; }

    .toc-list li {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      padding: 0.35rem 0;
    }

    .toc-num {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 1.5rem;
      text-align: right;
    }

    .toc-list a {
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 300;
      transition: color 0.15s;
    }

    .toc-list a:hover { color: var(--muted); }

    .chapter {
      margin-bottom: 6rem;
      scroll-margin-top: 4rem;
    }

    .chapter-header { margin-bottom: 2rem; }

    .chapter-number {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .chapter-title {
      font-size: 1.6rem;
      font-weight: 400;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .chapter-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }

    .chapter-body {
      font-size: 1rem;
      line-height: 1.85;
      font-weight: 300;
    }

    .chapter-body p { margin-bottom: 1.4em; }
    .chapter-body p + p { text-indent: 1.5em; margin-top: -0.4em; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-style: italic;
      padding: 4rem 0;
      font-size: 0.95rem;
    }

    .admin-link {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.7rem;
      color: var(--border);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .admin-link:hover { color: var(--muted); }

    /* ── Scene break ─────────────────────────────────────────────────────────── */

    .scene-break {
      text-align: center;
      color: var(--muted);
      padding: 1.5rem 0;
      letter-spacing: 0.35em;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      margin: 0.5rem 0;
    }

  </style>
</head>
<body>

  <div id="lock-screen">
    <svg class="lock-icon" id="lock-svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <div class="lock-form">
      <span class="lock-hint">Password required</span>
      <div class="lock-input-row">
        <input type="password" id="lock-password" placeholder="Enter password" autocomplete="off" />
        <button id="lock-submit">Open</button>
      </div>
    </div>
  </div>

  <div id="book" class="hidden">
    <header class="book-header">
      <h1 class="book-title" id="book-title"></h1>
      <p class="book-subtitle" id="book-subtitle"></p>
    </header>
    <nav class="toc" id="toc" style="display:none">
      <p class="toc-label">Contents</p>
      <ol class="toc-list" id="toc-list"></ol>
    </nav>
    <main id="chapters"></main>
    <p class="empty-state" id="empty-state" style="display:none">No chapters yet.</p>
  </div>

  <a href="admin.html" class="admin-link">admin</a>

  <script>
    // SHA-256 hash of 'edmund01' — the actual password never appears here.
    // To change the password, update this hash (use https://emn178.github.io/online-tools/sha256.html).
    const READER_HASH = 'd23148e2ddc47afef39fca96048a9afddc11e60c53c2c862721a1fab907d3d70';

    const lockScreen = document.getElementById('lock-screen');
    const lockSvg    = document.getElementById('lock-svg');
    const lockInput  = document.getElementById('lock-password');
    const lockSubmit = document.getElementById('lock-submit');
    const book       = document.getElementById('book');

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function showError() {
      lockInput.classList.add('error');
      lockInput.value = '';
      lockInput.placeholder = 'Try again';
      lockSubmit.disabled = false;
      setTimeout(() => {
        lockInput.classList.remove('error');
        lockInput.placeholder = 'Enter password';
        lockInput.focus();
      }, 1500);
    }

    async function tryUnlock() {
      lockSubmit.disabled = true;
      const attempt = lockInput.value;
      const hash = await sha256(attempt);

      if (hash !== READER_HASH) {
        showError();
        return;
      }

      lockSvg.classList.add('unlocking');
      setTimeout(() => {
        lockScreen.classList.add('hidden');
        book.classList.remove('hidden');
      }, 400);

      // Fetch the book data — content only loads after the correct password
      const res = await fetch(`./data/book.json?v=${Date.now()}`);
      const data = await res.json();
      renderBook(data);
    }

    lockSubmit.addEventListener('click', tryUnlock);
    lockInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
    lockInput.focus();

    // ── Render ────────────────────────────────────────────────────────────────

    function textToHtml(text) {
      return (text || '').trim()
        .split(/\n\s*\n/)
        .map(block => {
          const b = block.trim();
          // Scene break: a line containing only * * * (with optional spaces)
          if (/^\*(\s*\*){2}$/.test(b)) {
            return '<div class="scene-break">* * *</div>';
          }
          return `<p>${b.replace(/\n/g, ' ')}</p>`;
        })
        .join('');
    }

    function renderBook(data) {
      document.title = data.title || 'Reading';
      document.getElementById('book-title').textContent = data.title || '';
      const sub = document.getElementById('book-subtitle');
      sub.textContent = data.subtitle || '';
      sub.style.display = data.subtitle ? '' : 'none';

      const chaptersEl = document.getElementById('chapters');
      const tocList    = document.getElementById('toc-list');
      const toc        = document.getElementById('toc');
      const emptyState = document.getElementById('empty-state');

      chaptersEl.innerHTML = '';
      tocList.innerHTML    = '';

      if (!data.chapters || data.chapters.length === 0) {
        emptyState.style.display = '';
        toc.style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';
      toc.style.display = data.chapters.length > 1 ? '' : 'none';

      data.chapters.forEach((ch, i) => {
        const num    = i + 1;
        const anchor = `chapter-${ch.id}`;

        const li = document.createElement('li');
        li.innerHTML = `<span class="toc-num">${num}</span><a href="#${anchor}">${ch.title || `Chapter ${num}`}</a>`;
        tocList.appendChild(li);

        const section = document.createElement('section');
        section.className = 'chapter';
        section.id = anchor;
        section.innerHTML = `
          <div class="chapter-header">
            <p class="chapter-number">Chapter ${num}</p>
            ${ch.title ? `<h2 class="chapter-title">${ch.title}</h2>` : ''}
          </div>
          <hr class="chapter-divider">
          <div class="chapter-body">${textToHtml(ch.content)}</div>
        `;
        chaptersEl.appendChild(section);
      });
    }
  </script>
</body>
</html>
